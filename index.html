<!DOCTYPE html>
<html>
<head>
    <title>Peta Sebaran Lokasi Pegawai Dinas Kehutanan (Work From Home) Tahun 2026</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Turf -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 100vh; }

        .title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 20px;
            font-weight: bold;
            z-index: 1000;
            border-radius: 8px;
        }

        .panel {
            position: absolute;
            left: 10px;
            bottom: 10px;
            background: white;
            padding: 12px;
            z-index: 1000;
            border-radius: 10px;
            width: 260px;
            max-height: 90vh;
            overflow-y: auto;
        }

        select, input, button {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
        }

        button {
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .top-unit {
            font-size: 12px;
            margin-top: 5px;
        }

        /* LEGEND FLOATING */
        #legendFloating {
            position: absolute;
            bottom: 20px;
            right: 10px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            z-index: 1000;
            width: 200px;
            max-height: 250px;
            overflow-y: auto;
            font-size: 12px;
        }

        #legendFloating b {
            cursor: pointer;
        }

        #legendContent {
            display: none;
            margin-top: 5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-top: 3px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            margin-right: 6px;
            border: 1px solid #000;
        }
    </style>
</head>
<body>

<div class="title">
Peta Sebaran Lokasi Pegawai Dinas Kehutanan (Work From Home) Tahun 2026
</div>

<div id="map"></div>

<!-- LEGEND FLOATING -->
<div id="legendFloating">
    <b onclick="toggleLegend()">Legend ▼</b>
    <div id="legendContent"></div>
</div>

<div class="panel">
    <b>Filter Unit Kerja</b><br>
    <select id="filterUnit">
        <option value="all">Semua</option>
    </select>

    <hr>

    <b>Cari Nama</b><br>
    <input type="text" id="searchNama" placeholder="Masukkan Nama">
    <button onclick="cariNama()">Cari</button>
    <button onclick="resetFilter()">Reset Filter</button>

    <hr>

    <b>Total Pegawai:</b>
    <div id="totalPegawai">0</div>

    <div class="top-unit" id="topUnit"></div>

    <hr>

    <b>Info Kabupaten</b>
    <div id="infoKab">-</div>

    <hr>

    <b>Statistik Unit Kerja</b>
    <canvas id="chartUnit"></canvas>
</div>

<script>
// ================= MAP =================
var map = L.map('map').setView([-6.9, 107.6], 10);

// ================= BASEMAP =================
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
osm.addTo(map);

// ================= GLOBAL =================
var markersLayer = L.layerGroup().addTo(map);
var layerKabupaten;
var allData = [];
var markers = [];
var warnaUnit = {};
var chartUnit;

// ================= FIX ANGKA =================
function fixNumber(val){
    if(!val) return NaN;
    return parseFloat(String(val).replace(",", "."));
}

// ================= WARNA =================
function getRandomColor(){
    return '#' + Math.floor(Math.random()*16777215).toString(16);
}

// ================= LOAD DATA =================
fetch("pegawai.geojson")
.then(res => res.json())
.then(data => {

    allData = data.features.map(f => f.properties);
    document.getElementById("totalPegawai").innerHTML = allData.length;

    var unitUnik = [...new Set(allData.map(d => d["Unit Kerja"]))];
    unitUnik.forEach(u => warnaUnit[u] = getRandomColor());

    var select = document.getElementById("filterUnit");
    unitUnik.forEach(u => {
        var opt = document.createElement("option");
        opt.value = u;
        opt.innerHTML = u;
        select.appendChild(opt);
    });

    // LEGEND FLOATING
    var legendDiv = document.getElementById("legendContent");
    Object.keys(warnaUnit).forEach(u => {
        legendDiv.innerHTML += `
            <div class="legend-item">
                <div class="legend-color" style="background:${warnaUnit[u]}"></div>
                ${u}
            </div>
        `;
    });

    tampilkanData("all");
});

// ================= TOGGLE LEGEND =================
function toggleLegend(){
    var el = document.getElementById("legendContent");
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

// ================= POLYGON =================
fetch("Jawa Barattt.geojson")
.then(res => res.json())
.then(data => {

    layerKabupaten = L.geoJSON(data, {
        style: () => ({
            color: "#333",
            weight: 1,
            fillOpacity: 0.1
        }),

        onEachFeature: function(feature, layer){

            let namaKab = feature.properties.KAB_KOTA;

            layer.bindPopup(`<b>Kabupaten/Kota:</b> ${namaKab}<br><i>Klik untuk filter</i>`);

            layer.on("click", function(){

                layerKabupaten.eachLayer(l => layerKabupaten.resetStyle(l));

                layer.setStyle({
                    fillColor: "yellow",
                    fillOpacity: 0.4
                });

                let dataFilter = allData.filter(d => {

                    let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
                    let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);

                    if(isNaN(lat) || isNaN(lon)) return false;

                    let point = turf.point([lon, lat]);
                    return turf.booleanPointInPolygon(point, feature);
                });

                tampilkanDataKabupaten(dataFilter, namaKab);

                document.getElementById("infoKab").innerHTML =
                    `<b>${namaKab}</b><br>Jumlah Pegawai: ${dataFilter.length}`;

                map.fitBounds(layer.getBounds());
            });
        }
    }).addTo(map);

    L.control.layers({}, {
        "Batas Kabupaten": layerKabupaten,
        "Lokasi Pegawai": markersLayer
    }).addTo(map);
});

// ================= TAMPILKAN DATA =================
function tampilkanData(filter){

    markersLayer.clearLayers();
    markers = [];

    let dataFilter = allData.filter(d =>
        filter === "all" || d["Unit Kerja"] === filter
    );

    dataFilter.forEach(d => {

        let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
        let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);

        if(isNaN(lat) || isNaN(lon)) return;

        let marker = L.circleMarker([lat, lon], {
            radius: 3,
            fillColor: warnaUnit[d["Unit Kerja"]],
            color: "#000",
            weight: 1,
            fillOpacity: 0.9
        }).bindPopup(`
            <b>Nama:</b> ${d.Nama}<br>
            <b>Unit Kerja:</b> ${d["Unit Kerja"]}<br>
            <b>Jabatan:</b> ${d["Nama Jabatan"]}<br>
            <b>Alamat:</b> ${d["Alamat Rumah"]}
        `);

        marker.nama = (d.Nama || "").toLowerCase();
        marker.latlng = [lat, lon];

        markers.push(marker);
        markersLayer.addLayer(marker);
    });

    document.getElementById("totalPegawai").innerHTML = dataFilter.length;
    updateChart(dataFilter);
}

// ================= SEARCH =================
function cariNama(){
    var val = document.getElementById("searchNama").value.toLowerCase().trim();

    var results = markers.filter(m => m.nama.includes(val));

    if(results.length > 0){
        let group = [];
        results.forEach(m => {
            m.openPopup();
            group.push(m.getLatLng());
        });
        map.fitBounds(group);
    } else {
        alert("Nama tidak ditemukan");
    }
}

// ================= RESET =================
function resetFilter(){
    tampilkanData("all");
    document.getElementById("filterUnit").value = "all";
    document.getElementById("searchNama").value = "";
    document.getElementById("infoKab").innerHTML = "-";

    if(layerKabupaten){
        layerKabupaten.eachLayer(l => layerKabupaten.resetStyle(l));
    }

    map.setView([-6.9, 107.6], 10);
}

// ================= FILTER KAB =================
function tampilkanDataKabupaten(dataFilter, namaKab){

    markersLayer.clearLayers();
    markers = [];

    dataFilter.forEach(d => {

        let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
        let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);

        if(isNaN(lat) || isNaN(lon)) return;

        let marker = L.circleMarker([lat, lon], {
            radius: 3,
            fillColor: warnaUnit[d["Unit Kerja"]],
            color: "#000",
            weight: 1,
            fillOpacity: 0.9
        }).bindPopup(`
            <b>Nama:</b> ${d.Nama}<br>
            <b>Unit Kerja:</b> ${d["Unit Kerja"]}<br>
            <b>Jabatan:</b> ${d["Nama Jabatan"]}<br>
            <b>Alamat:</b> ${d["Alamat Rumah"]}<br>
            <b>Kabupaten:</b> ${namaKab}
        `);

        marker.nama = (d.Nama || "").toLowerCase();
        marker.latlng = [lat, lon];

        markers.push(marker);
        markersLayer.addLayer(marker);
    });

    document.getElementById("totalPegawai").innerHTML = dataFilter.length;
    updateChart(dataFilter);
}

// ================= CHART =================
function updateChart(data){

    if(chartUnit) chartUnit.destroy();

    let statUnit = {};

    data.forEach(d => {
        let u = d["Unit Kerja"];
        if(u) statUnit[u] = (statUnit[u] || 0) + 1;
    });

    let sorted = Object.entries(statUnit).sort((a,b)=>b[1]-a[1]);
    if(sorted.length > 0){
        document.getElementById("topUnit").innerHTML =
            "Unit terbanyak: <b>" + sorted[0][0] + "</b> (" + sorted[0][1] + ")";
    }

    chartUnit = new Chart(document.getElementById("chartUnit"), {
        type: 'doughnut',
        data: {
            labels: Object.keys(statUnit),
            datasets: [{
                data: Object.values(statUnit),
                backgroundColor: Object.keys(statUnit).map(u => warnaUnit[u])
            }]
        },
        options: {
            plugins: { legend: { position: 'bottom' } },
            cutout: '50%'
        }
    });
}
</script>

</body>
</html>
