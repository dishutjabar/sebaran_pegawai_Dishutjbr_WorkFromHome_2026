<!DOCTYPE html>
<html>
<head>
    <title>Peta Sebaran Lokasi Pegawai Dinas Kehutanan (Work From Home) Tahun 2026</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- TURF (WAJIB UNTUK FILTER POLYGON) -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 100vh; }

        .title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 20px;
            font-weight: bold;
            z-index: 1000;
            border-radius: 8px;
        }

        .panel {
            position: absolute;
            left: 10px;
            bottom: 10px;
            background: white;
            padding: 12px;
            z-index: 1000;
            border-radius: 10px;
            width: 260px;
        }

        .panel canvas {
            max-height: 150px;
        }

        select, input, button {
            width: 100%;
            box-sizing: border-box;
            padding: 6px;
            margin-top: 4px;
        }

        button {
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1a5edb;
        }

        .top-unit {
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="title">
Peta Sebaran Lokasi Pegawai Dinas Kehutanan (Work From Home) Tahun 2026
</div>

<div id="map"></div>

<div class="panel">
    <b>Filter Unit Kerja</b><br>
    <select id="filterUnit">
        <option value="all">Semua</option>
    </select>

    <hr>

    <b>Cari Nama</b><br>
    <input type="text" id="searchNama" placeholder="Masukkan Nama">
    <button onclick="cariNama()">Cari</button>

    <hr>

    <b>Total Pegawai:</b>
    <div id="totalPegawai">0</div>

    <div class="top-unit" id="topUnit"></div>

    <hr>

    <b>Statistik Unit Kerja</b>
    <canvas id="chartUnit"></canvas>
</div>

<script>
// ================= MAP =================
var map = L.map('map').setView([-6.9, 107.6], 10);

// ================= BASEMAP =================
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var satellite = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');
var terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
var esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

osm.addTo(map);

var baseMaps = {
    "OpenStreetMap": osm,
    "Satellite": satellite,
    "Terrain": terrain,
    "ESRI Satellite": esri
};

// ================= GLOBAL =================
var markersLayer = L.layerGroup().addTo(map);
var layerKabupaten;
var allData = [];
var markers = [];
var warnaUnit = {};
var chartUnit;

// ================= FIX ANGKA =================
function fixNumber(val){
    if(!val) return NaN;
    return parseFloat(String(val).replace(",", "."));
}

// ================= WARNA =================
function getRandomColor(){
    return '#' + Math.floor(Math.random()*16777215).toString(16);
}

// ================= LOAD DATA PEGAWAI =================
fetch("pegawai.geojson")
.then(res => res.json())
.then(data => {

    allData = data.features.map(f => f.properties);
    document.getElementById("totalPegawai").innerHTML = allData.length;

    var unitUnik = [...new Set(allData.map(d => d["Unit Kerja"]))];
    unitUnik.forEach(u => warnaUnit[u] = getRandomColor());

    var select = document.getElementById("filterUnit");
    unitUnik.forEach(u => {
        var opt = document.createElement("option");
        opt.value = u;
        opt.innerHTML = u;
        select.appendChild(opt);
    });

    tampilkanData("all");
});

// ================= LOAD POLYGON KABUPATEN =================
fetch("Jawa Barattt.geojson")
.then(res => res.json())
.then(data => {

    layerKabupaten = L.geoJSON(data, {
        style: function(feature){
            return {
                color: "#333",
                weight: 1,
                fillOpacity: 0.1
            };
        },

        onEachFeature: function(feature, layer){

            let namaKab = feature.properties.KAB_KOTA;

            layer.bindPopup(
                "<b>Kabupaten/Kota:</b> " + namaKab + "<br><i>Klik untuk filter</i>"
            );

            layer.on("click", function(){

                markersLayer.clearLayers();

                let dataFilter = allData.filter(d => {

                    let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
                    let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);

                    if(isNaN(lat) || isNaN(lon)) return false;

                    let point = turf.point([lon, lat]);
                    return turf.booleanPointInPolygon(point, feature);
                });

                tampilkanDataKabupaten(dataFilter, namaKab);

                // zoom ke kabupaten
                map.fitBounds(layer.getBounds());
            });
        }
    });

    layerKabupaten.addTo(map);

    var overlayMaps = {
        "Batas Kabupaten": layerKabupaten,
        "Lokasi Pegawai": markersLayer
    };

    L.control.layers(baseMaps, overlayMaps).addTo(map);
});

// ================= TAMPILKAN DATA =================
function tampilkanData(filter){

    markersLayer.clearLayers();
    markers = [];

    let dataFilter = allData.filter(d => {
        return filter === "all" || d["Unit Kerja"] === filter;
    });

    dataFilter.forEach(d => {

        let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
        let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);

        if(isNaN(lat) || isNaN(lon)) return;

        let marker = L.circleMarker([lat, lon], {
            radius: 3,
            fillColor: warnaUnit[d["Unit Kerja"]],
            color: "#000",
            weight: 1,
            fillOpacity: 0.9
        }).bindPopup(`
            <b>Nama:</b> ${d.Nama}<br>
            <b>Unit Kerja:</b> ${d["Unit Kerja"]}<br>
            <b>Jabatan:</b> ${d["Nama Jabatan"]}<br>
            <b>Alamat:</b> ${d["Alamat Rumah"]}
        `);

        marker.nama = (d.Nama || "").toLowerCase();
        marker.latlng = [lat, lon];

        markers.push(marker);
        markersLayer.addLayer(marker);
    });

    document.getElementById("totalPegawai").innerHTML = dataFilter.length;

    updateChart(dataFilter);
}

// ================= FILTER =================
document.getElementById("filterUnit").onchange = function(){
    tampilkanData(this.value);
};

// ================= SEARCH =================
function cariNama(){
    var val = document.getElementById("searchNama").value.toLowerCase().trim();

    var found = markers.find(m => m.nama.includes(val));

    if(found){
        map.setView(found.latlng, 16);
        found.openPopup();
    } else {
        alert("Nama tidak ditemukan");
    }
}

// ================= FILTER KABUPATEN =================
function tampilkanDataKabupaten(dataFilter, namaKab){

    markersLayer.clearLayers();
    markers = [];

    dataFilter.forEach(d => {

        let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
        let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);

        if(isNaN(lat) || isNaN(lon)) return;

        let marker = L.circleMarker([lat, lon], {
            radius: 3,
            fillColor: warnaUnit[d["Unit Kerja"]],
            color: "#000",
            weight: 1,
            fillOpacity: 0.9
        }).bindPopup(`
            <b>Nama:</b> ${d.Nama}<br>
            <b>Unit Kerja:</b> ${d["Unit Kerja"]}<br>
            <b>Jabatan:</b> ${d["Nama Jabatan"]}<br>
            <b>Alamat:</b> ${d["Alamat Rumah"]}<br>
            <b>Kabupaten:</b> ${namaKab}
        `);

        marker.nama = (d.Nama || "").toLowerCase();
        marker.latlng = [lat, lon];

        markers.push(marker);
        markersLayer.addLayer(marker);
    });

    document.getElementById("totalPegawai").innerHTML = dataFilter.length;

    updateChart(dataFilter);
}

// ================= CHART =================
function updateChart(data){

    if(chartUnit) chartUnit.destroy();

    let statUnit = {};

    data.forEach(d => {
        let u = d["Unit Kerja"];
        if(u) statUnit[u] = (statUnit[u] || 0) + 1;
    });

    let sorted = Object.entries(statUnit).sort((a,b)=>b[1]-a[1]);
    if(sorted.length > 0){
        document.getElementById("topUnit").innerHTML =
            "Unit terbanyak: <b>" + sorted[0][0] + "</b> (" + sorted[0][1] + ")";
    }

    chartUnit = new Chart(document.getElementById("chartUnit"), {
        type: 'doughnut',
        data: {
            labels: Object.keys(statUnit),
            datasets: [{
                data: Object.values(statUnit),
                backgroundColor: Object.keys(statUnit).map(u => warnaUnit[u])
            }]
        },
        options: {
            plugins: {
                legend: { position: 'bottom' }
            },
            cutout: '50%',
            onClick: (evt, el) => {
                if(el.length > 0){
                    let unit = chartUnit.data.labels[el[0].index];
                    document.getElementById("filterUnit").value = unit;
                    tampilkanData(unit);
                }
            }
        }
    });
}
</script>

</body>
</html>
