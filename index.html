<!DOCTYPE html>
<html>
<head>
    <title>Peta Sebaran Lokasi Pegawai Dinas Kehutanan (Work From Home) Tahun 2026</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Turf -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 100vh; }
        .title {
            position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%);
            background: white; padding: 10px 20px;
            font-weight: bold; z-index: 1000; border-radius: 8px;
        }
        .panel {
            position: absolute; left: 10px; bottom: 10px;
            background: white; padding: 12px;
            z-index: 1000; border-radius: 10px; width: 260px;
        }
        select, input, button { width: 100%; padding: 6px; margin-top: 4px; }
        button { background: #2c7be5; color: white; border: none; border-radius: 6px; }
    </style>
</head>
<body>

<div class="title">
Peta Sebaran Lokasi Pegawai Dinas Kehutanan (Work From Home) Tahun 2026
</div>

<div id="map"></div>

<div class="panel">
    <b>Filter Unit Kerja</b>
    <select id="filterUnit"><option value="all">Semua</option></select>

    <hr>

    <b>Filter Kabupaten</b>
    <select id="filterKabupaten"><option value="all">Semua</option></select>

    <div id="listKabupaten" style="max-height:120px; overflow:auto;"></div>

    <hr>

    <input type="text" id="searchNama" placeholder="Masukkan Nama">
    <button onclick="cariNama()">Cari</button>

    <hr>

    <b>Total Pegawai:</b>
    <div id="totalPegawai">0</div>

    <canvas id="chartUnit"></canvas>
</div>

<script>
// ================= MAP =================
var map = L.map('map').setView([-6.9, 107.6], 10);

// ================= BASEMAP =================
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var satellite = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');
var terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
var esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

osm.addTo(map);

var baseMaps = {
    "OpenStreetMap": osm,
    "Satellite": satellite,
    "Terrain": terrain,
    "ESRI Satellite": esri
};

// ================= GLOBAL =================
var markersLayer = L.layerGroup().addTo(map);
var allData = [];
var markers = [];
var warnaUnit = {};
var chartUnit;

var geoKabupaten;
var kabupatenLayers = {};
var kabupatenAktif = new Set();
var selectedKabupaten = "all";

var kabupatenReady = false; // 🔥 FIX ASYNC

// ================= HELPER =================
function fixNumber(val){
    if(!val) return NaN;
    return parseFloat(String(val).replace(",", "."));
}
function getRandomColor(){
    return '#' + Math.floor(Math.random()*16777215).toString(16);
}

// ================= LOAD KABUPATEN =================
fetch("Jawa Barattt.geojson")
.then(res => res.json())
.then(data => {

    geoKabupaten = data;

    var layerKabupaten = L.geoJSON(data, {
        style: { color:"#333", weight:1, fillOpacity:0.1 },
        onEachFeature: function(feature, layer){
            let nama = feature.properties.KAB_KOTA;
            kabupatenLayers[nama] = layer;
            kabupatenAktif.add(nama);
            layer.bindPopup(nama);
        }
    }).addTo(map);

    Object.keys(kabupatenLayers).forEach(k => {
        let opt = document.createElement("option");
        opt.value = k; opt.innerHTML = k;
        document.getElementById("filterKabupaten").appendChild(opt);

        let div = document.createElement("div");
        div.innerHTML = `<input type="checkbox" checked onchange="toggleKab('${k}', this.checked)"> ${k}`;
        document.getElementById("listKabupaten").appendChild(div);
    });

    L.control.layers(baseMaps, {
        "Batas Kabupaten": layerKabupaten,
        "Lokasi Pegawai": markersLayer
    }).addTo(map);

    kabupatenReady = true; // ✅ tanda siap
});

// ================= LOAD PEGAWAI =================
fetch("pegawai.geojson")
.then(res => res.json())
.then(data => {

    function proses(){

        allData = data.features.map(f => f.properties);
        document.getElementById("totalPegawai").innerHTML = allData.length;

        // 🔥 AUTO KABUPATEN
        allData.forEach(d => {

            let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
            let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);
            if(isNaN(lat) || isNaN(lon)) return;

            let pt = turf.point([lon, lat]);

            for(let f of geoKabupaten.features){
                if(turf.booleanPointInPolygon(pt, f)){
                    d.Kabupaten = f.properties.KAB_KOTA;
                    break;
                }
            }
        });

        let unitUnik = [...new Set(allData.map(d => d["Unit Kerja"]))];
        unitUnik.forEach(u => {
            warnaUnit[u] = getRandomColor();
            let opt = document.createElement("option");
            opt.value = u; opt.innerHTML = u;
            document.getElementById("filterUnit").appendChild(opt);
        });

        tampilkanData("all");
    }

    // 🔥 FIX: tunggu kabupaten siap
    let cek = setInterval(()=>{
        if(kabupatenReady){
            clearInterval(cek);
            proses();
        }
    },200);
});

// ================= FILTER =================
document.getElementById("filterUnit").onchange = function(){
    tampilkanData(this.value);
};
document.getElementById("filterKabupaten").onchange = function(){
    selectedKabupaten = this.value;
    tampilkanData(document.getElementById("filterUnit").value);
};

// ================= TOGGLE =================
function toggleKab(nama, visible){
    if(visible){
        map.addLayer(kabupatenLayers[nama]);
        kabupatenAktif.add(nama);
    } else {
        map.removeLayer(kabupatenLayers[nama]);
        kabupatenAktif.delete(nama);
    }
    tampilkanData(document.getElementById("filterUnit").value);
}

// ================= SHOW =================
function tampilkanData(filter){

    markersLayer.clearLayers();
    markers = [];

    let dataFilter = allData.filter(d => {
        return (filter==="all"||d["Unit Kerja"]===filter)
            && (selectedKabupaten==="all"||d.Kabupaten===selectedKabupaten)
            && kabupatenAktif.has(d.Kabupaten);
    });

    dataFilter.forEach(d => {

        let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
        let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);
        if(isNaN(lat) || isNaN(lon)) return;

        let m = L.circleMarker([lat, lon], {
            radius:3,
            fillColor: warnaUnit[d["Unit Kerja"]],
            color:"#000",
            weight:1,
            fillOpacity:0.9
        }).bindPopup(`
            <b>Nama:</b> ${d.Nama}<br>
            <b>Unit Kerja:</b> ${d["Unit Kerja"]}<br>
            <b>Jabatan:</b> ${d["Nama Jabatan"]}<br>
            <b>Alamat:</b> ${d["Alamat Rumah"]}<br>
            <b>Kabupaten:</b> ${d.Kabupaten || "-"}
        `);

        m.nama = (d.Nama||"").toLowerCase();
        m.latlng = [lat, lon];

        markers.push(m);
        markersLayer.addLayer(m);
    });

    document.getElementById("totalPegawai").innerHTML = dataFilter.length;
}

// ================= SEARCH =================
function cariNama(){
    let val = document.getElementById("searchNama").value.toLowerCase();
    let f = markers.find(m => m.nama.includes(val));
    if(f){
        map.setView(f.latlng,16);
        f.openPopup();
    } else alert("Nama tidak ditemukan");
}
</script>

</body>
</html>
