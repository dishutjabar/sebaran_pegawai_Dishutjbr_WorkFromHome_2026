<!DOCTYPE html>
<html>
<head>
    <title>Peta Sebaran Lokasi Pegawai Dinas Kehutanan (Work From Home) Tahun 2026</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 100vh; }

        .panel {
            position: absolute;
            left: 10px;
            bottom: 10px;
            background: white;
            padding: 12px;
            border-radius: 10px;
            width: 260px;
            z-index: 1000;
        }

        .panel canvas {
            max-height: 150px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <b>Filter Unit Kerja</b><br>
    <select id="filterUnit">
        <option value="all">Semua</option>
    </select>

    <hr>

    <b>Cari NIP</b><br>
    <input type="text" id="searchNIP">
    <button onclick="cariNIP()">Cari</button>

    <hr>

    <b>Total Pegawai:</b>
    <div id="totalPegawai">0</div>

    <hr>

    <canvas id="chartUnit"></canvas>
</div>

<script>
// ================= MAP =================
var map = L.map('map').setView([-6.9, 107.6], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= GLOBAL =================
var markersLayer = L.layerGroup().addTo(map);
var allData = [];
var markers = [];
var warnaUnit = {};
var chartUnit;

// ================= FIX NUMBER =================
function fixNumber(val){
    if(!val) return NaN;
    return parseFloat(String(val).replace(",", "."));
}

// ================= COLOR =================
function getRandomColor(){
    return '#' + Math.floor(Math.random()*16777215).toString(16);
}

// ================= LOAD =================
fetch("pegawai.geojson")
.then(res => res.json())
.then(data => {

    allData = data.features.map(f => f.properties);

    // 🔥 warna dibuat SEKALI
    let unitList = [...new Set(allData.map(d => d["Unit Kerja"]))];
    unitList.forEach(u => warnaUnit[u] = getRandomColor());

    // dropdown
    let select = document.getElementById("filterUnit");
    unitList.forEach(u => {
        let opt = document.createElement("option");
        opt.value = u;
        opt.innerHTML = u;
        select.appendChild(opt);
    });

    tampilkanData("all");
});

// ================= TAMPILKAN =================
function tampilkanData(filter){

    markersLayer.clearLayers();
    markers = [];

    let dataFilter = allData.filter(d => {
        return filter === "all" || d["Unit Kerja"] === filter;
    });

    dataFilter.forEach(d => {

        let lat = fixNumber(d["Koordinat Rumah (Latitude)"]);
        let lon = fixNumber(d["Koordinat Rumah (Longitude)"]);

        if(isNaN(lat) || isNaN(lon)) return;

        let marker = L.circleMarker([lat, lon], {
            radius: 2,
            fillColor: warnaUnit[d["Unit Kerja"]],
            color: "#000",
            weight: 1,
            fillOpacity: 0.9
        }).bindPopup(`
            <b>Nama:</b> ${d.Nama}<br>
            <b>Unit Kerja:</b> ${d["Unit Kerja"]}<br>
            <b>Jabatan:</b> ${d["Nama Jabatan"]}<br>
            <b>Alamat:</b> ${d["Alamat Rumah"]}
        `);

        marker.nip = d.nip;
        marker.latlng = [lat, lon];

        markers.push(marker);
        markersLayer.addLayer(marker);
    });

    document.getElementById("totalPegawai").innerHTML = dataFilter.length;

    updateChart(dataFilter);
}

// ================= FILTER =================
document.getElementById("filterUnit").onchange = function(){
    tampilkanData(this.value);
};

// ================= SEARCH FIX =================
function cariNIP(){
    let val = document.getElementById("searchNIP").value;

    let found = markers.find(m => m.nip == val);

    if(found){
        map.setView(found.latlng, 16);
        found.openPopup();
    } else {
        alert("NIP tidak ditemukan");
    }
}

// ================= CHART FIX =================
function updateChart(data){

    if(chartUnit) chartUnit.destroy();

    let stat = {};

    data.forEach(d => {
        let u = d["Unit Kerja"];
        if(u) stat[u] = (stat[u] || 0) + 1;
    });

    chartUnit = new Chart(document.getElementById("chartUnit"), {
        type: 'pie',
        data: {
            labels: Object.keys(stat),
            datasets: [{
                data: Object.values(stat),
                backgroundColor: Object.keys(stat).map(u => warnaUnit[u])
            }]
        },
        options: {
            plugins: { legend: { position: 'bottom' } },

            onClick: (evt, el) => {
                if(el.length > 0){
                    let unit = chartUnit.data.labels[el[0].index];
                    document.getElementById("filterUnit").value = unit;
                    tampilkanData(unit);
                }
            }
        }
    });
}

// ================= BATAS =================
fetch("Jawa Barat.geojson")
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        style: { color: "black", weight: 1, fillOpacity: 0 }
    }).addTo(map);
});
</script>

</body>
</html>
